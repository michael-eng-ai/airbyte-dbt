# Pipeline: PostgreSQL → Debezium CDC → Kafka → Consumer → dbt → Streamlit
# Credenciais padrão: admin/admin
# Substitui Airbyte por Kafka+Debezium (~5GB RAM economizados)

networks:
  pipeline_network:
    name: pipeline_network

services:
  # ============================================================================
  # BANCO SOURCE - CDC (WAL logical replication habilitado)
  # ============================================================================
  postgres_source:
    image: postgres:13
    container_name: postgres_source_db
    networks:
      - pipeline_network
      - default
    ports:
      - "5430:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db_source
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_source_data:/var/lib/postgresql/data
      - ../postgres_init_scripts:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c max_logical_replication_workers=10
      -c listen_addresses='*'
      -c track_commit_timestamp=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db_source"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # BANCO TARGET - Destino dos eventos Kafka
  # ============================================================================
  postgres_target:
    image: postgres:13
    container_name: postgres_target_db
    networks:
      - pipeline_network
      - default
    ports:
      - "5431:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db_target
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_target_data:/var/lib/postgresql/data
      - ../postgres_target_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db_target"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # DATA LAKE - MinIO (S3-Compatible)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ============================================================================
  # APIs SIMULADAS DE FONTE
  # ============================================================================
  api_ecommerce:
    image: python:3.9-slim
    container_name: api_ecommerce
    ports:
      - "8010:8000"
    volumes:
      - ../apis_simuladas:/app
    working_dir: /app
    command: >
      bash -c "
      pip install fastapi uvicorn pandas faker requests -q;
      python ecommerce_api.py
      "
    restart: unless-stopped

  api_crm:
    image: python:3.9-slim
    container_name: api_crm
    ports:
      - "8011:8000"
    volumes:
      - ../apis_simuladas:/app
    working_dir: /app
    command: >
      bash -c "
      pip install fastapi uvicorn pandas faker requests -q;
      python crm_api.py
      "
    restart: unless-stopped

  # ============================================================================
  # KAFKA STACK
  # ============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - pipeline_network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/commands/stat > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - pipeline_network
      - default
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================================
  # KAFKA CONNECT + DEBEZIUM
  # ============================================================================
  kafka-connect:
    image: debezium/connect:2.5
    container_name: kafka_connect
    networks:
      - pipeline_network
      - default
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-pipeline-group
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PRODUCER_MAX_REQUEST_SIZE: 10485760
    depends_on:
      kafka:
        condition: service_healthy
      postgres_source:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================================
  # KAFKA CONSUMER → postgres_target
  # ============================================================================
  kafka_consumer:
    image: python:3.11-slim
    container_name: kafka_consumer
    networks:
      - pipeline_network
      - default
    volumes:
      - ../scripts:/app/scripts
    working_dir: /app
    command: >
      bash -c "
      pip install confluent-kafka psycopg2-binary -q;
      echo 'Aguardando Kafka Connect...' && sleep 15;
      python3 scripts/kafka_consumer.py
      "
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      TARGET_HOST: postgres_target_db
      TARGET_PORT: 5432
      TARGET_DB: db_target
      TARGET_USER: admin
      TARGET_PASSWORD: admin
    depends_on:
      kafka:
        condition: service_healthy
      postgres_target:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================================
  # DBT RUNNER
  # ============================================================================
  dbt_runner:
    image: python:3.9-slim
    container_name: dbt_runner_container
    networks:
      - pipeline_network
    depends_on:
      postgres_target:
        condition: service_healthy
    volumes:
      - ../dbt_project:/usr/app/dbt_project
      - ../dbt_profiles:/root/.dbt
    working_dir: /usr/app/dbt_project
    environment:
      DBT_TARGET_TYPE: postgres
      DBT_TARGET_HOST: postgres_target
      DBT_TARGET_PORT: 5432
      DBT_TARGET_USER: admin
      DBT_TARGET_PASSWORD: admin
      DBT_TARGET_DB: db_target
      DBT_TARGET_SCHEMA: public
    command: >
      bash -c "
      pip install dbt-postgres==1.9.0 dbt-core==1.9.0 -q;
      tail -f /dev/null;
      "
    restart: unless-stopped

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_source_data:
  postgres_target_data:
  minio_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data: